# Railway build + start config for the ADMIN service (wonderful-strength).
# Serves ONLY the Next.js admin dashboard. The BullMQ workers + Discord bot
# run in the SEPARATE worker service (patient-communication) via host:start —
# do NOT run them here too, or the Discord bot logs in twice and customers get
# duplicate emails/SMS.
#
# NOTE: the worker service overrides build/start in its own Railway UI settings,
# so this file only governs the admin service.
#
# Migrations are NOT run in the build: build-time connections to Neon are flaky
# (advisory-lock timeouts / cold endpoint) and blocked deploys. Run migrations
# deliberately instead:  npx prisma migrate deploy  (locally, against prod URL).

[phases.build]
cmds = ["npx prisma generate", "npx next build"]

[start]
cmd = "npm run start"
